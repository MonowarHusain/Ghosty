<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghosty | Send Anonymous Messages</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <div class="card">
            <div class="profile-pic">👻</div>
            <h1>Ghosty</h1>
            <p>Send me an anonymous message!</p>

            <textarea id="msgInput" placeholder="Write something secret..." maxlength="500"></textarea>

            <button onclick="sendMsg()" id="sendBtn">Send Anonymously</button>
            <p id="status"></p>
        </div>
    </div>

    <script>
        async function sendMsg() {
            const btn = document.getElementById('sendBtn');
            const status = document.getElementById('status');
            const message = document.getElementById('msgInput').value;

            if (!message) return alert("You can't send an empty ghost!");

            btn.disabled = true;
            btn.innerText = "Vanishing...";

            try {
                const res = await fetch('/api/send', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message })
                });

                if (res.ok) {
                    status.innerText = "👻 Your message has haunted their inbox!";
                    document.getElementById('msgInput').value = "";
                } else {
                    status.innerText = "❌ The ghost got lost. Try again!";
                }
            } catch (e) {
                status.innerText = "❌ Connection error.";
            } finally {
                btn.disabled = false;
                btn.innerText = "Send Anonymously";
            }
        }
    </script>
</body>

</html>
